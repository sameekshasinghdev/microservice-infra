name: Docker CI/CD Pipeline

on:
  push:
    branches: [ "master" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'

    - name: Build with Maven
      run: mvn clean package -DskipTests

    - name: Log in to DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build & Push Auth Service
      run: |
        cd auth-service
        docker build -t sam1209/auth-service:latest .
        docker push sam1209/auth-service:latest

    - name: Build & Push Book Service
      run: |
        cd book-service
        docker build -t sam1209/book-service:latest .
        docker push sam1209/book-service:latest

    - name: Build & Push Order Service
      run: |
        cd order-service
        docker build -t sam1209/order-service:latest .
        docker push sam1209/order-service:latest

    - name: Build & Push API Gateway
      run: |
        cd api-gateway
        docker build -t sam1209/api-gateway:latest .
        docker push sam1209/api-gateway:latest

    - name: Build & Push Eureka
      run: |
        cd eureka
        docker build -t sam1209/eureka:latest .
        docker push sam1209/eureka:latest

    - name: Build & Push Config Server
      run: |
        cd config-server
        docker build -t sam1209/config-server:latest .
        docker push sam1209/config-server:latest